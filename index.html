<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#171916">
  <meta name="description" content="Deutschraum A2 - mobile Lernbegleitung zu Netzwerk neu A2.2">
  <title>Deutschraum A2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" data-view="home" aria-label="Startseite">
        <span class="brand-mark">D</span>
        <span>
          <strong>DEUTSCHRAUM</strong>
          <small>A2 SPRACHLABOR</small>
        </span>
      </button>
      <div class="top-actions">
        <button class="icon-button" id="searchButton" aria-label="Suchen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4 4"/></svg>
        </button>
        <button class="translation-toggle" id="translationToggle" aria-pressed="true">
          <span>ع</span>
          <span class="toggle-track"><i></i></span>
        </button>
      </div>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <button class="active" data-view="home">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v10h13V10M9.5 20v-6h5v6"/></svg>
        <span>Start</span>
      </button>
      <button data-view="lessons">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4.5h11a3 3 0 0 1 3 3V20H8a3 3 0 0 1-3-3Z"/><path d="M5 17a3 3 0 0 1 3-3h11M9 8h6"/></svg>
        <span>Lektionen</span>
      </button>
      <button data-view="practice">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 4.5 6v5c0 4.8 3 8.3 7.5 10 4.5-1.7 7.5-5.2 7.5-10V6Z"/><path d="m8.5 12 2.2 2.2 4.8-5"/></svg>
        <span>Training</span>
      </button>
      <button data-view="saved">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12v17l-6-3.5L6 21Z"/></svg>
        <span>Merkliste</span>
      </button>
    </nav>
  </div>

  <dialog id="searchDialog" class="search-dialog">
    <div class="search-head">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4 4"/></svg>
      <input id="searchInput" type="search" placeholder="Wort oder Thema suchen..." autocomplete="off">
      <button id="closeSearch" aria-label="Schließen">×</button>
    </div>
    <div id="searchResults" class="search-results"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
